# Fly.io deployment config (for the WebSocket server)
# Deploy with: fly launch && fly deploy
app = "babel-tower"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.alive]
    type = "tcp"
    port = 3456
    interval = "15s"
    timeout = "2s"
