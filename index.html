<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRING IT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden; background: #0a0a12;
      font-family: 'Inter', sans-serif; color: #fff;
      user-select: none; -webkit-user-select: none;
    }
    canvas#game { display: block; width: 100vw; height: 100vh; }

    /* ─── Lobby Overlay ──────────────────────────────── */
    #lobby {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10,10,18,0.95);
    }
    #lobby .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px; letter-spacing: 8px;
      background: linear-gradient(135deg, #FF1493, #FF6B35, #FFE600);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #lobby .subtitle {
      font-size: 14px; color: #666; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 40px;
    }
    #lobby .player-count {
      font-size: 24px; color: #aaa; margin-bottom: 20px;
    }
    #lobby .player-count span { color: #FF1493; font-weight: 900; }
    #lobby .start-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px; letter-spacing: 4px;
      padding: 12px 48px; border: 2px solid #FF1493;
      background: transparent; color: #FF1493;
      cursor: pointer; transition: all 0.2s;
    }
    #lobby .start-btn:hover {
      background: #FF1493; color: #0a0a12;
    }
    #lobby .start-btn:disabled {
      border-color: #333; color: #333; cursor: not-allowed;
    }
    #lobby .start-btn:disabled:hover { background: transparent; color: #333; }
    #lobby .instructions {
      margin-top: 30px; color: #555; font-size: 12px;
      text-align: center; line-height: 2;
    }
    #lobby .instructions kbd {
      background: #222; padding: 2px 8px; border-radius: 3px;
      border: 1px solid #444; font-family: monospace;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="lobby">
    <div class="title">BRING IT</div>
    <div class="subtitle">rhythm &bull; party &bull; chaos</div>
    <div class="player-count">Players: <span id="lobby-count">0</span></div>
    <button class="start-btn" id="start-btn" disabled>WAITING FOR PLAYERS</button>
    <div class="instructions">
      <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or
      <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move on the beat<br>
      Caller sets the pattern &bull; Responders copy it &bull; Miss it and you're out
    </div>
  </div>

  <script>
    window.GAME_SERVER_URL = '';
  </script>
  <script src="https://unpkg.com/colyseus.js@0.15.24/dist/colyseus.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
