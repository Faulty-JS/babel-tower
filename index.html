<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BABEL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #f5f3f0; cursor: crosshair; font-family: monospace; }
    canvas { display: block; }

    /* ─── Blocker (click to enter) ─────────────────────────────── */
    #blocker {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(245,243,240,0.95); display: flex; align-items: center;
      justify-content: center; z-index: 100; cursor: pointer;
      flex-direction: column;
    }
    #blocker .title {
      font-family: monospace; font-size: 64px; color: #111;
      letter-spacing: 20px; margin-bottom: 10px;
    }
    #blocker .subtitle {
      font-family: monospace; font-size: 12px; color: #888;
      letter-spacing: 4px; margin-bottom: 30px;
    }
    #blocker .prompt {
      color: #666; font-family: monospace; font-size: 14px;
      text-align: center; line-height: 2; animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ─── HUD ──────────────────────────────────────────────────── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 50;
    }
    #hud-height {
      position: fixed; top: 12px; left: 16px;
      color: #222; font-size: 14px; opacity: 0.7;
    }
    #hud-players {
      position: fixed; top: 12px; right: 16px;
      color: #222; font-size: 14px; opacity: 0.7;
    }
    #hud-interact {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      color: #111; font-size: 16px;
      background: rgba(255,255,255,0.85); padding: 8px 20px;
      border: 1px solid #999;
      animation: pulse-interact 1.5s infinite;
    }
    @keyframes pulse-interact {
      0%, 100% { opacity: 0.6; border-color: #aaa; }
      50% { opacity: 1; border-color: #333; }
    }
    #hud-controls {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      color: #999; font-size: 11px; opacity: 0.6;
      white-space: nowrap;
    }

    /* ─── Puzzle Overlay ───────────────────────────────────────── */
    #puzzle-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(245, 243, 240, 0.95); display: none; z-index: 200;
      font-family: monospace; color: #111;
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    #puzzle-content {
      max-width: 600px; width: 90%; padding: 24px;
      border: 1px solid #ccc; background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .puzzle-header {
      color: #999; font-size: 12px; margin-bottom: 16px;
      border-bottom: 1px solid #ddd; padding-bottom: 8px;
    }
    .puzzle-category {
      color: #888; font-size: 11px; margin-bottom: 8px;
    }
    .puzzle-question {
      color: #111; font-size: 16px; margin-bottom: 20px;
      line-height: 1.6;
    }
    .puzzle-options {
      display: flex; flex-direction: column; gap: 8px;
    }
    .puzzle-btn {
      background: #fafafa; border: 1px solid #ccc;
      color: #333; padding: 10px 16px; font-family: monospace;
      font-size: 14px; cursor: pointer; text-align: left;
      transition: all 0.15s;
    }
    .puzzle-btn:hover {
      background: #eee; border-color: #333;
      color: #000;
    }
    .puzzle-hint {
      color: #aaa; font-size: 11px; margin-top: 16px;
      text-align: center;
    }
    .puzzle-success {
      text-align: center; font-size: 20px; color: #111;
      padding: 30px; animation: flash-success 0.5s;
      font-weight: bold;
    }
    .puzzle-fail {
      text-align: center; font-size: 20px; color: #cc0000;
      padding: 30px; animation: flash-fail 0.3s;
    }
    @keyframes flash-success {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes flash-fail {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Word excavation grid */
    .word-cell {
      width: 100%; aspect-ratio: 1; display: flex;
      align-items: center; justify-content: center;
      background: #fafafa; border: 1px solid #ddd;
      color: #555; font-size: 16px; cursor: pointer;
      transition: all 0.1s; user-select: none;
    }
    .word-cell:hover { background: #eee; }
    .word-cell.selected {
      background: #222; color: #fff;
      border-color: #000;
    }
    .word-display {
      text-align: center; font-size: 24px; color: #111;
      margin: 12px 0; min-height: 30px; letter-spacing: 4px;
    }

    /* Pattern sequence */
    .pattern-sequence {
      display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .pattern-item {
      width: 44px; height: 44px; display: flex;
      align-items: center; justify-content: center;
      border: 1px solid #ccc; font-size: 16px;
      color: #333; background: #fafafa;
    }
    .pattern-color {
      border-radius: 4px;
    }
    .pattern-mystery {
      color: #111; font-size: 24px; font-weight: bold;
      animation: pulse-interact 1s infinite;
    }
    .puzzle-flag {
      display: block; margin: 12px auto;
    }

    /* ─── Chat ─────────────────────────────────────────────────── */
    #chat-container {
      position: fixed; bottom: 40px; left: 16px;
      width: 320px; z-index: 60; pointer-events: none;
    }
    #chat-messages {
      max-height: 200px; overflow: hidden;
    }
    .chat-message {
      color: #666; font-size: 12px; padding: 3px 0;
      opacity: 0.8; transition: opacity 1s;
    }
    .chat-message.fading { opacity: 0; }
    #chat-input-row {
      display: none; pointer-events: all; margin-top: 4px;
    }
    #chat-input {
      width: 100%; background: rgba(255,255,255,0.95);
      border: 1px solid #aaa; color: #111;
      font-family: monospace; font-size: 13px;
      padding: 6px 10px; outline: none;
    }
    #chat-input:focus { border-color: #333; }
    #chat-input::placeholder { color: #bbb; }

    /* ─── Growth Flash ─────────────────────────────────────────── */
    #growth-flash {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px; color: #111;
      letter-spacing: 8px; opacity: 0;
      transition: opacity 0.5s;
      z-index: 300; pointer-events: none;
      font-weight: bold;
    }
    #growth-flash.visible { opacity: 1; }

    /* Glyph trace canvas styling */
    #puzzle-content canvas {
      border: 1px solid #ccc !important;
      background: #fff !important;
    }
  </style>
</head>
<body>
  <div id="blocker">
    <div class="title">BABEL</div>
    <div class="subtitle">A TOWER BUILT BY STRANGERS</div>
    <div class="prompt">click to enter the tower</div>
  </div>

  <!-- Server config: set BABEL_SERVER_URL to your Railway WebSocket URL in production -->
  <!-- e.g. wss://babel-tower-production.up.railway.app -->
  <script>
    // Leave empty for same-origin (dev), set to Railway URL for Cloudflare Pages deploy
    window.BABEL_SERVER_URL = '';
  </script>

  <!-- Colyseus client -->
  <script src="https://unpkg.com/colyseus.js@0.15.24/dist/colyseus.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.170.0/three.module.min.js"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
